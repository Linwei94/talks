<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview B — Swiss Modern</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }

.slide {
    width: 100vw; height: 100vh;
    background: #f5f5f5;
    font-family: 'Nunito', sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
    position: relative;
    overflow: hidden;
}

/* Top rule */
.top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(1.5rem, 3vw, 3rem) clamp(2rem, 6vw, 6rem);
    border-bottom: 2px solid #111;
    opacity: 0; animation: fade 0.5s 0.1s forwards;
}
.logo-text {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: clamp(0.7rem, 1.2vw, 0.9rem);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: #111;
}
.date-tag {
    font-size: clamp(0.6rem, 0.9vw, 0.75rem);
    color: #ff3300;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 600;
}

/* Center content */
.center {
    padding: clamp(2rem, 5vw, 6rem) clamp(2rem, 6vw, 6rem);
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
}

/* Red vertical accent bar */
.accent-bar {
    position: absolute;
    left: clamp(2rem, 6vw, 6rem);
    top: 50%; transform: translateY(-50%);
    width: 4px;
    height: 60%;
    background: #ff3300;
    opacity: 0; animation: fade 0.6s 0.3s forwards;
}

.title-block {
    padding-left: clamp(1.5rem, 3vw, 3rem);
}
.eyebrow {
    font-family: 'Archivo', sans-serif;
    font-size: clamp(0.6rem, 1vw, 0.75rem);
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: #ff3300;
    margin-bottom: clamp(0.5rem, 1.5vh, 1rem);
    opacity: 0; transform: translateX(-20px);
    animation: slide 0.6s cubic-bezier(0.16,1,0.3,1) 0.35s forwards;
}
.main-title {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: clamp(2rem, 5.5vw, 5rem);
    color: #111;
    line-height: 1.0;
    text-transform: uppercase;
    opacity: 0; transform: translateX(-20px);
    animation: slide 0.7s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
}
.subtitle {
    font-size: clamp(0.8rem, 1.5vw, 1.1rem);
    color: #555;
    margin-top: clamp(1rem, 2vh, 1.5rem);
    font-weight: 300;
    max-width: 40vw;
    line-height: 1.6;
    opacity: 0; transform: translateX(-20px);
    animation: slide 0.7s cubic-bezier(0.16,1,0.3,1) 0.65s forwards;
}

/* Grid decoration top right */
.grid-deco {
    position: absolute;
    top: 15%; right: clamp(2rem, 6vw, 6rem);
    display: grid; grid-template-columns: repeat(8, 1fr);
    gap: 8px; width: clamp(80px, 15vw, 160px);
    opacity: 0; animation: fade 1s 0.8s forwards;
}
.grid-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: #ccc;
}
.grid-dot:nth-child(3n) { background: #ff3300; }

/* Bottom rule */
.bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(1rem, 2vw, 2rem) clamp(2rem, 6vw, 6rem);
    border-top: 1px solid #ddd;
    opacity: 0; animation: fade 0.5s 1s forwards;
}
.presenter { font-size: clamp(0.65rem, 1vw, 0.8rem); color: #888; letter-spacing: 0.1em; }
.tag {
    font-size: clamp(0.55rem, 0.8vw, 0.65rem);
    background: #111; color: #f5f5f5;
    padding: 0.3em 0.8em; letter-spacing: 0.1em;
    text-transform: uppercase;
}

@keyframes fade { to { opacity: 1; } }
@keyframes slide { to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>
<div class="slide">
    <div class="top-bar">
        <div class="logo-text">Lab Seminar</div>
        <div class="date-tag">2026.03.18</div>
    </div>
    <div class="center">
        <div class="accent-bar"></div>
        <div class="title-block">
            <div class="eyebrow">AI Agent in the Wild</div>
            <div class="main-title">Research<br>&amp; Engineering</div>
            <div class="subtitle">Claude Code applied to a NeurIPS paper and a production app — simultaneously.</div>
        </div>
        <div class="grid-deco">
            <div class="grid-dot"></div><div class="grid-dot"></div><div class="grid-dot"></div>
            <div class="grid-dot"></div><div class="grid-dot"></div><div class="grid-dot"></div>
            <div class="grid-dot"></div><div class="grid-dot"></div><div class="grid-dot"></div>
            <div class="grid-dot"></div><div class="grid-dot"></div><div class="grid-dot"></div>
            <div class="grid-dot"></div><div class="grid-dot"></div><div class="grid-dot"></div>
            <div class="grid-dot"></div><div class="grid-dot"></div><div class="grid-dot"></div>
            <div class="grid-dot"></div><div class="grid-dot"></div><div class="grid-dot"></div>
            <div class="grid-dot"></div><div class="grid-dot"></div><div class="grid-dot"></div>
        </div>
    </div>
    <div class="bottom-bar">
        <div class="presenter">Linwei Tao</div>
        <div class="tag">Style B — Swiss Modern</div>
    </div>
</div>
</body>
</html>
