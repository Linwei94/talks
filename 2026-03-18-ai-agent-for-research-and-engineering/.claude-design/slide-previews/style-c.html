<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview C — Ink & Depth</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }

.slide {
    width: 100vw; height: 100vh;
    background: #0c0c0e;
    font-family: 'IBM Plex Mono', monospace;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* Ambient gradient blobs */
.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
}
.blob-1 {
    width: 40vw; height: 40vw;
    background: rgba(100, 200, 255, 0.06);
    top: -10%; left: -5%;
    animation: drift 8s ease-in-out infinite alternate;
}
.blob-2 {
    width: 30vw; height: 30vw;
    background: rgba(180, 120, 255, 0.05);
    bottom: -5%; right: 10%;
    animation: drift 10s ease-in-out infinite alternate-reverse;
}

@keyframes drift {
    from { transform: translate(0, 0); }
    to { transform: translate(3%, 3%); }
}

/* Horizontal rule top */
.top-rule {
    position: absolute; top: 0; left: 0; right: 0;
    height: 1px; background: rgba(255,255,255,0.08);
}
.top-info {
    position: absolute; top: clamp(1.5rem, 3vh, 2.5rem);
    left: clamp(2rem, 5vw, 5rem); right: clamp(2rem, 5vw, 5rem);
    display: flex; justify-content: space-between; align-items: center;
    opacity: 0; animation: fadeIn 0.8s 0.1s forwards;
}
.mono-label {
    font-size: clamp(0.55rem, 0.8vw, 0.65rem);
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.25em;
    text-transform: uppercase;
}
.mono-label span { color: rgba(100,200,255,0.6); }

/* Main content */
.content {
    padding: 0 clamp(2rem, 5vw, 5rem);
    position: relative;
    z-index: 1;
}

.tag-line {
    font-size: clamp(0.55rem, 0.85vw, 0.7rem);
    color: rgba(100,200,255,0.7);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: clamp(0.75rem, 2vh, 1.5rem);
    opacity: 0; transform: translateY(15px);
    animation: up 0.6s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
}

.main-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.2rem, 6vw, 5.5rem);
    color: #f0ede8;
    line-height: 1.0;
    letter-spacing: -0.02em;
    opacity: 0; transform: translateY(20px);
    animation: up 0.8s cubic-bezier(0.16,1,0.3,1) 0.45s forwards;
}
.main-title em {
    font-style: normal;
    color: transparent;
    -webkit-text-stroke: 1px rgba(240,237,232,0.4);
}

.divider {
    display: flex; align-items: center; gap: 1rem;
    margin: clamp(1rem, 3vh, 2rem) 0;
    opacity: 0; animation: fadeIn 0.6s 0.75s forwards;
}
.divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); max-width: 12rem; }
.divider-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(100,200,255,0.5); }

.subtitle {
    font-size: clamp(0.7rem, 1.1vw, 0.875rem);
    color: rgba(255,255,255,0.35);
    line-height: 1.7;
    max-width: 38rem;
    font-weight: 300;
    opacity: 0; transform: translateY(15px);
    animation: up 0.7s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
}
.subtitle strong { color: rgba(255,255,255,0.6); font-weight: 500; }

/* Pills */
.pills {
    display: flex; gap: 0.75rem; flex-wrap: wrap;
    margin-top: clamp(1.5rem, 3vh, 2.5rem);
    opacity: 0; animation: up 0.6s 1.1s forwards;
}
.pill {
    font-size: clamp(0.55rem, 0.8vw, 0.65rem);
    padding: 0.4em 1em;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
}
.pill.active {
    border-color: rgba(100,200,255,0.4);
    color: rgba(100,200,255,0.8);
    background: rgba(100,200,255,0.06);
}

/* Bottom */
.bottom-info {
    position: absolute; bottom: clamp(1.5rem, 3vh, 2.5rem);
    left: clamp(2rem, 5vw, 5rem); right: clamp(2rem, 5vw, 5rem);
    display: flex; justify-content: space-between; align-items: center;
    opacity: 0; animation: fadeIn 0.8s 1.2s forwards;
}
.presenter { font-size: clamp(0.55rem, 0.8vw, 0.65rem); color: rgba(255,255,255,0.2); letter-spacing: 0.15em; }
.style-tag {
    font-size: clamp(0.5rem, 0.75vw, 0.6rem);
    color: rgba(100,200,255,0.4);
    letter-spacing: 0.2em;
    text-transform: uppercase;
}

@keyframes up { to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { to { opacity: 1; } }
</style>
</head>
<body>
<div class="slide">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="top-rule"></div>
    <div class="top-info">
        <div class="mono-label">Lab Seminar · <span>2026.03.18</span></div>
        <div class="mono-label"><span>Claude Code</span> · 50 min</div>
    </div>
    <div class="content">
        <div class="tag-line">// AI Agent in Practice</div>
        <div class="main-title">AI Agent<br>for <em>Research</em><br>&amp; Engineering</div>
        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-dot"></div>
        </div>
        <div class="subtitle">
            <strong>NeurIPS 投稿 + 生产级 app</strong>，用同一个工具，同时完成。<br>
            今天讲讲怎么做到的。
        </div>
        <div class="pills">
            <div class="pill active">CalibrationAGT</div>
            <div class="pill active">猫咪寄养系统</div>
            <div class="pill">gnvitop</div>
            <div class="pill">Tool Use</div>
            <div class="pill">Memory</div>
        </div>
    </div>
    <div class="bottom-info">
        <div class="presenter">Linwei Tao</div>
        <div class="style-tag">Style C — Ink &amp; Depth</div>
    </div>
</div>
</body>
</html>
