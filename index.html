<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linwei Tao — Talks</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #111;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #ccc;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 40%, rgba(232,50,26,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 70%, rgba(218,119,86,0.03) 0%, transparent 55%);
    animation: breathe 8s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes breathe {
    from { opacity: 0.6; }
    to   { opacity: 1; }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 5rem 2rem 6rem;
  }

  header {
    margin-bottom: 4rem;
  }

  .eyebrow {
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #e8321a;
    margin-bottom: 1rem;
  }

  header h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    color: #e8e8e8;
    line-height: 1.2;
    margin-bottom: 0.6rem;
  }

  header p {
    font-size: 0.9rem;
    color: #555;
  }

  .divider {
    width: 2.5rem;
    height: 2px;
    background: #e8321a;
    border-radius: 2px;
    margin: 2rem 0 3.5rem;
  }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 1.5rem;
  }

  .talks-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .talk-card {
    display: grid;
    grid-template-columns: 7rem 1fr auto;
    align-items: center;
    gap: 2rem;
    padding: 1.6rem 2rem;
    border: 1.5px solid #1e1e1e;
    border-radius: 12px;
    background: #151515;
    text-decoration: none;
    color: inherit;
    transition: all 0.18s ease;
  }

  .talk-card:hover {
    border-color: #e8321a;
    background: #1a1210;
    transform: translateX(4px);
    box-shadow: 0 8px 32px rgba(232,50,26,0.08);
  }

  .talk-date {
    font-size: 0.72rem;
    color: #444;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .talk-info h2 {
    font-size: 1rem;
    font-weight: 600;
    color: #e0e0e0;
    line-height: 1.4;
    margin-bottom: 0.3rem;
  }

  .talk-info .venue {
    font-size: 0.75rem;
    color: #555;
  }

  .talk-arrow {
    font-size: 1rem;
    color: #333;
    transition: color 0.18s, transform 0.18s;
    flex-shrink: 0;
  }

  .talk-card:hover .talk-arrow {
    color: #e8321a;
    transform: translateX(3px);
  }

  footer {
    position: fixed;
    bottom: 1.5rem;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.62rem;
    color: #2a2a2a;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    z-index: 1;
  }

  @media (max-width: 540px) {
    .talk-card {
      grid-template-columns: 1fr auto;
      gap: 1rem;
    }
    .talk-date {
      grid-column: 1 / -1;
      margin-bottom: -0.5rem;
    }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <p class="eyebrow">Linwei Tao</p>
    <h1>Talks &amp; Presentations</h1>
    <p>Public lectures, seminars, and invited talks.</p>
  </header>

  <div class="divider"></div>

  <p class="section-label">All Talks</p>

  <div class="talks-list">

    <a class="talk-card" href="./2026-03-18-ai-agent-for-research-and-engineering/slides/index.html">
      <span class="talk-date">2026-03-18</span>
      <div class="talk-info">
        <h2>AI Agent for Research and Engineering</h2>
        <p class="venue">Lab Seminar &mdash; USYD, School of Computer Science</p>
      </div>
      <span class="talk-arrow">&#8594;</span>
    </a>

  </div>
</div>

<footer>github.com/Linwei94/talks</footer>

</body>
</html>
